spring:
  application:
    name: product
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/product_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  server:
    port: 8083
    servlet:
      context-path: /api/v1/
